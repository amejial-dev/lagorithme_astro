# Despliegue del sitio en Netlify.
#
# Este archivo va en la raíz del repositorio y no dentro de astro-site,
# porque Netlify siempre lo busca aquí. `base` es lo que le dice que el
# proyecto vive en un subdirectorio: a partir de ahí, tanto el comando
# como la carpeta publicada se resuelven relativos a esa base.

[build]
  base = "astro-site"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Igual que la versión local. Astro 5 pide 18.20.8+, 20.3+ o 22+; sin
  # fijarla aquí, Netlify puede cambiar su versión por defecto y romper
  # un despliegue sin que nadie haya tocado el código.
  NODE_VERSION = "22"

# Astro mete un hash en el nombre de cada archivo de _astro/, así que su
# contenido nunca cambia sin cambiar también de nombre. Se pueden cachear
# para siempre sin riesgo de servir una versión vieja.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# El HTML sí se revalida en cada visita: es lo que cambia en cada
# despliegue y lo que enlaza con los assets nuevos.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
